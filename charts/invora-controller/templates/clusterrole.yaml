apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "invora-controller.fullname" . }}-manager
  labels:
    {{- include "invora-controller.labels" . | nindent 4 }}
rules:
  - apiGroups: ["billing.invora.app"]
    resources:
      - invorabillinginstances
      - invorabillingorganizations
      - invorabillingmetrics
      - invorabillingplans
      - invorabillingtaxes
      - invorabillingaddons
      - invorabillingcoupons
      - invorabillingfeatures
      - invorabillingcustomers
      - invorabillingsubscriptions
      - invorabillingwebhookendpoints
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["billing.invora.app"]
    resources:
      - invorabillinginstances/status
      - invorabillingorganizations/status
      - invorabillingmetrics/status
      - invorabillingplans/status
      - invorabillingtaxes/status
      - invorabillingaddons/status
      - invorabillingcoupons/status
      - invorabillingfeatures/status
      - invorabillingcustomers/status
      - invorabillingsubscriptions/status
      - invorabillingwebhookendpoints/status
    verbs: ["get", "update", "patch"]
  - apiGroups: ["billing.invora.app"]
    resources:
      - invorabillinginstances/finalizers
      - invorabillingorganizations/finalizers
      - invorabillingmetrics/finalizers
      - invorabillingplans/finalizers
      - invorabillingtaxes/finalizers
      - invorabillingaddons/finalizers
      - invorabillingcoupons/finalizers
      - invorabillingfeatures/finalizers
      - invorabillingcustomers/finalizers
      - invorabillingsubscriptions/finalizers
      - invorabillingwebhookendpoints/finalizers
      - invorabillingtapproviders/finalizers
      - invorabillingstripeproviders/finalizers
      - invorabillingadyenproviders/finalizers
      - invorabillinggocardlessproviders/finalizers
      - invorabillingpaymentproviders/finalizers
      - invorabillingwallets/finalizers
    verbs: ["update"]
  # core.invora.app — InvoraInstance, InvoraBranch, InvoraConnectedBusiness
  - apiGroups: ["core.invora.app"]
    resources: ["*"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["core.invora.app"]
    resources: ["*/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["core.invora.app"]
    resources: ["*/finalizers"]
    verbs: ["update"]
  # invoicing.invora.app — InvoraInvoicingRegulation, InvoraInvoicingSettings
  - apiGroups: ["invoicing.invora.app"]
    resources: ["*"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["invoicing.invora.app"]
    resources: ["*/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["invoicing.invora.app"]
    resources: ["*/finalizers"]
    verbs: ["update"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  # Phase 4 — Zitadel event subscriber needs to discover Zitadel CRs and
  # persist its last-processed event sequence to a ConfigMap.
  - apiGroups: ["zitadel.bdaya-dev.com"]
    resources: ["zitadelinstances", "zitadelorganizations"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "invora-controller.fullname" . }}-manager
  labels:
    {{- include "invora-controller.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "invora-controller.fullname" . }}-manager
subjects:
  - kind: ServiceAccount
    name: {{ .Values.serviceAccount.name }}
    namespace: {{ .Release.Namespace }}
