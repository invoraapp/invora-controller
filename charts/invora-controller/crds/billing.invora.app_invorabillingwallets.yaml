---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.17.2
  name: invorabillingwallets.billing.invora.app
spec:
  group: billing.invora.app
  names:
    kind: InvoraBillingWallet
    listKind: InvoraBillingWalletList
    plural: invorabillingwallets
    shortNames:
    - iwallet
    singular: invorabillingwallet
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.externalCustomerId
      name: Customer
      type: string
    - jsonPath: .spec.currency
      name: Currency
      type: string
    - jsonPath: .status.balanceCredits
      name: Balance
      type: string
    - jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: InvoraBillingWallet represents a prepaid credit wallet attached
          to a customer.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              InvoraBillingWalletSpec defines a prepaid credit wallet attached to a
              billing customer. Wallets allow customers to maintain a credit balance
              that is automatically applied to invoices before charging the payment method.
            properties:
              currency:
                description: Currency is the wallet currency (ISO 4217). Must match
                  the customer's currency.
                maxLength: 3
                minLength: 3
                type: string
              deletionPolicy:
                default: Delete
                description: |-
                  DeletionPolicy determines what happens to the billing resource when this
                  CR is deleted.
                enum:
                - Delete
                - Orphan
                type: string
              expirationAt:
                description: ExpirationAt is when the wallet expires (ISO 8601). Empty
                  means no expiration.
                type: string
              externalCustomerId:
                description: ExternalCustomerID is the customer who owns this wallet.
                minLength: 1
                type: string
              grantedCredits:
                description: GrantedCredits is the initial free/promotional credits
                  to grant.
                type: string
              name:
                description: Name is a human-readable label for the wallet.
                type: string
              organizationRef:
                description: OrganizationRef references the InvoraBillingOrganization
                  that owns this wallet.
                properties:
                  name:
                    description: Name of the referenced resource.
                    minLength: 1
                    type: string
                  namespace:
                    description: |-
                      Namespace of the referenced resource. Defaults to the namespace
                      of the referencing resource when omitted.
                    type: string
                required:
                - name
                type: object
              paidCredits:
                description: PaidCredits is the initial credits to grant on creation.
                type: string
              rateAmount:
                default: "1.0"
                description: |-
                  RateAmount is the conversion rate from credits to currency units.
                  For 1:1 mapping, set to "1.0".
                type: string
              recurringTopUp:
                description: RecurringTopUp configures automatic wallet top-up rules.
                properties:
                  grantedCredits:
                    description: GrantedCredits is the free credits to add on each
                      top-up.
                    type: string
                  interval:
                    description: 'Interval is the top-up frequency for fixed method:
                      "weekly" or "monthly" or "quarterly" or "yearly".'
                    type: string
                  method:
                    description: 'Method is the top-up trigger: "fixed" (periodic)
                      or "target" (balance threshold).'
                    enum:
                    - fixed
                    - target
                    type: string
                  paidCredits:
                    description: PaidCredits is the amount to top up each time.
                    type: string
                  thresholdCredits:
                    description: ThresholdCredits triggers top-up when balance falls
                      below this (target method).
                    type: string
                required:
                - method
                - paidCredits
                type: object
            required:
            - currency
            - externalCustomerId
            - organizationRef
            type: object
          status:
            description: InvoraBillingWalletStatus defines the observed state.
            properties:
              balanceCredits:
                description: BalanceCredits is the current credit balance (last observed).
                type: string
              conditions:
                description: |-
                  Conditions represent the latest available observations of the
                  resource's state.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              consumedCredits:
                description: ConsumedCredits is the total credits consumed (last observed).
                type: string
              id:
                description: ID is the billing-backend-assigned resource identifier.
                type: string
              lastSyncedAt:
                description: |-
                  LastSyncedAt is the last time the controller successfully reconciled
                  the resource against the billing API.
                format: date-time
                type: string
              observedGeneration:
                description: |-
                  ObservedGeneration is the most recent .metadata.generation observed
                  by the controller.
                format: int64
                type: integer
              walletId:
                description: WalletID is the billing-backend-assigned UUID for this
                  wallet.
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
