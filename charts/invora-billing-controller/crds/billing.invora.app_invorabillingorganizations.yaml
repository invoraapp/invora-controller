---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.17.2
  name: invorabillingorganizations.billing.invora.app
spec:
  group: billing.invora.app
  names:
    kind: InvoraBillingOrganization
    listKind: InvoraBillingOrganizationList
    plural: invorabillingorganizations
    shortNames:
    - lorg
    singular: billingorganization
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.name
      name: OrgName
      type: string
    - jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          InvoraBillingOrganization represents an organization in a billing instance.
          The controller creates the org via super-admin GraphQL mutations,
          generates an API key, and writes it to the Secret specified by
          spec.writeSecretToRef.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              InvoraBillingOrganizationSpec defines the desired state of a InvoraBillingOrganization.
              Organizations are the top-level tenant boundary in billing — they own
              plans, billable metrics, customers, and all billing resources.
            properties:
              deletionPolicy:
                default: Delete
                description: DeletionPolicy determines what happens to the billing org
                  when this CR is deleted.
                enum:
                - Delete
                - Orphan
                type: string
              documentNumbering:
                description: DocumentNumbering controls invoice numbering scheme.
                enum:
                - per_organization
                - per_billing_entity
                type: string
              email:
                description: Email for the organization admin account.
                type: string
              enableParentDualWrite:
                description: |-
                  EnableParentDualWrite controls whether the controller writes a customer
                  record to the parent org when ParentOrgRef is set. Defaults to true.
                  Set to false to disable dual-write while keeping ParentOrgRef for
                  observability or future activation. Has no effect when ParentOrgRef is nil.
                type: boolean
              externalId:
                description: |-
                  ExternalID is an optional stable identifier carried by the corresponding
                  customer record in the parent org. When empty, defaults to the org's
                  Zitadel ID stored in metadata.name (typically "tenant-<zitadel-org-id>").
                type: string
              instanceRef:
                description: InstanceRef references the InvoraBillingInstance connection to
                  use.
                properties:
                  name:
                    description: Name of the referenced resource.
                    minLength: 1
                    type: string
                  namespace:
                    description: |-
                      Namespace of the referenced resource. Defaults to the namespace
                      of the referencing resource when omitted.
                    type: string
                required:
                - name
                type: object
              name:
                description: Name of the organization.
                minLength: 1
                type: string
              parentOrgRef:
                description: |-
                  ParentOrgRef references another InvoraBillingOrganization that owns this tenant
                  as a customer. When set, a corresponding InvoraBillingCustomer will be created
                  in the parent org pointing at this org's externalId. Used to implement
                  reseller / multi-tier billing where the parent invoices Invora and the
                  child (tenant) sub-invoices its own end users.
                properties:
                  name:
                    description: Name of the referenced resource.
                    minLength: 1
                    type: string
                  namespace:
                    description: |-
                      Namespace of the referenced resource. Defaults to the namespace
                      of the referencing resource when omitted.
                    type: string
                required:
                - name
                type: object
              timezone:
                description: Timezone (IANA format, e.g. "UTC", "America/New_York").
                type: string
              writeSecretToRef:
                description: |-
                  WriteSecretToRef specifies where to write the org's API key.
                  The Secret will contain key "apiKey" with the org's bearer token.
                  This is required — child resources need the API key to authenticate.
                properties:
                  annotations:
                    additionalProperties:
                      type: string
                    description: Annotations to add to the created Secret.
                    type: object
                  labels:
                    additionalProperties:
                      type: string
                    description: Labels to add to the created Secret.
                    type: object
                  name:
                    description: Name of the Secret to create or update.
                    minLength: 1
                    type: string
                  namespace:
                    description: Namespace of the Secret. Defaults to the referencing
                      resource's namespace.
                    type: string
                required:
                - name
                type: object
            required:
            - instanceRef
            - name
            - writeSecretToRef
            type: object
          status:
            description: InvoraBillingOrganizationStatus defines the observed state of a InvoraBillingOrganization.
            properties:
              apiKeyId:
                description: ApiKeyID is the billing UUID of the current API key (needed
                  for regeneration).
                type: string
              conditions:
                description: |-
                  Conditions represent the latest available observations of the
                  resource's state.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              id:
                description: ID is the billing-assigned resource identifier.
                type: string
              lastSyncedAt:
                description: |-
                  LastSyncedAt is the last time the controller successfully reconciled
                  the resource against the billing API.
                format: date-time
                type: string
              observedGeneration:
                description: |-
                  ObservedGeneration is the most recent .metadata.generation observed
                  by the controller.
                format: int64
                type: integer
              organizationId:
                description: OrganizationID is the billing UUID for this org.
                type: string
              parentCustomerId:
                description: |-
                  ParentCustomerID is the billing UUID of the customer entity in the parent org
                  that represents this tenant. Empty when no parent dual-write is active.
                type: string
              parentOrgRef:
                description: |-
                  ParentOrgRef echoes the spec.parentOrgRef the controller last reconciled
                  against, so a change can be detected by comparing observed vs. desired.
                properties:
                  name:
                    description: Name of the referenced resource.
                    minLength: 1
                    type: string
                  namespace:
                    description: |-
                      Namespace of the referenced resource. Defaults to the namespace
                      of the referencing resource when omitted.
                    type: string
                required:
                - name
                type: object
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
