---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.17.2
  name: invorabranches.core.invora.app
spec:
  group: core.invora.app
  names:
    kind: InvoraBranch
    listKind: InvoraBranchList
    plural: invorabranches
    shortNames:
    - ibranch
    singular: invorabranch
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.name
      name: Name
      type: string
    - jsonPath: .spec.isDefault
      name: Default
      type: boolean
    - jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: InvoraBranch represents a branch within an Invora organization.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              InvoraBranchSpec defines a branch within an Invora organization.
              Branches represent distinct business locations or trade names, each with
              their own regulation config, document prefixes, and party information.
            properties:
              documentPrefix:
                description: DocumentPrefix is the prefix for all documents issued
                  from this branch.
                type: string
              instanceRef:
                description: InstanceRef references the InvoraBillingInstance (gateway
                  connection).
                properties:
                  name:
                    type: string
                  namespace:
                    type: string
                required:
                - name
                type: object
              isDefault:
                description: IsDefault marks this as the primary branch of the organization.
                type: boolean
              name:
                description: Name is the branch display name.
                minLength: 1
                type: string
              party:
                description: Party contains the legal party information for this branch.
                properties:
                  address:
                    description: Address holds the branch's physical address.
                    properties:
                      additionalNo:
                        type: string
                      building:
                        type: string
                      city:
                        type: string
                      country:
                        type: string
                      postalCode:
                        type: string
                      state:
                        type: string
                      street:
                        type: string
                    type: object
                  commercialRegistrationNumber:
                    description: CommercialRegistrationNumber is the CRN / company
                      registry number.
                    type: string
                  legalName:
                    description: LegalName is the registered legal name.
                    type: string
                  taxId:
                    description: TaxID is the tax identification number (e.g., VAT
                      number).
                    type: string
                type: object
              regulationConfig:
                description: RegulationConfig contains per-regulation settings for
                  this branch.
                properties:
                  etaBranchId:
                    description: 'ETA Egypt-specific: Branch ID registered with the
                      Egyptian Tax Authority.'
                    type: string
                  peppolGln:
                    description: 'Peppol-specific: Global Location Number for electronic
                      delivery.'
                    type: string
                  zatcaBranchId:
                    description: 'ZATCA-specific: Branch ID registered with ZATCA.'
                    type: string
                  zatcaCsid:
                    description: 'ZATCA-specific: Cryptographic Stamp Identifier for
                      Saudi e-invoicing.'
                    type: string
                type: object
              tradeName:
                description: TradeName is the DBA (Doing Business As) name for this
                  branch.
                type: string
            required:
            - instanceRef
            - name
            type: object
          status:
            description: InvoraBranchStatus defines the observed state.
            properties:
              branchId:
                description: BranchID is the backend-assigned ID for this branch.
                type: string
              conditions:
                description: Conditions represent the latest observations.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              lastSyncedAt:
                description: LastSyncedAt is the last time this resource was synced.
                format: date-time
                type: string
              observedGeneration:
                description: ObservedGeneration is the last spec generation the controller
                  acted on.
                format: int64
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
